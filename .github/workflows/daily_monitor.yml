name: Daily Insider Trading Monitor

on:
  schedule:
    - cron: '0 18 * * 1-5'  # 6 PM UTC (1 PM Mexico) solo dias habiles
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install beautifulsoup4 requests

    - name: Run monitor
      env:
        MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python daily_monitor.py

    - name: Commit database changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -f data/forward_testing.db
        git diff --quiet && git diff --staged --quiet || git commit -m "DB update $(date +'%Y-%m-%d')"

    - name: Push changes
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
